<!DOCTYPE html>
<html>
<head>
  <title>Profil Yanto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f2f2f2;
      scroll-behavior: smooth;
    }

    /* ===== NAVBAR ===== */
    nav {
      background: #008000;
      padding: 15px;
      position: relative;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* HAMBURGER */
    .menu-icon {
      display: none;
      font-size: 24px;
      color: white;
      cursor: pointer;
      position: absolute;
      right: 20px;
      top: 15px;
    }

    .menu {
      display: inline-block;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .menu {
        display: none;
        flex-direction: column;
        background: #008000;
        margin-top: 10px;
      }

      .menu a {
        display: block;
        margin: 10px 0;
      }

      .menu-icon {
        display: block;
      }
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      background: white;
      width: 300px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
    }

    footer {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }
  </style>
</head>


<body>

  <nav>
    <span class="menu-icon" onclick="toggleMenu()">☰</span>

    <div class="menu" id="menu">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <section id="home">
    <div class="card">
      <h1>Yanto</h1>
      <p>Web developer pemula yang lagi belajar coding.</p>
    </div>
  </section>

  <section id="about">
    <h2>Tentang Saya</h2>
    <p>Saya sedang belajar HTML & CSS dan ingin jadi developer profesional.</p>
  </section>

  <section id="contact">
    <h2>Hubungi Saya</h2>
    <p>Email: yanto@email.com</p>
  </section>

  <footer>
    © 2026 Yanto
  </footer>

  <script>
    function toggleMenu() {
      var menu = document.getElementById("menu");
      if (menu.style.display === "block") {
        menu.style.display = "none";
      } else {
        menu.style.display = "block";
      }
    }
  </script>

</body>
</html>
