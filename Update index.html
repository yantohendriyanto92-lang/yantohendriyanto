<!DOCTYPE html>
<html>
<head>
  <title>Profil Yanto</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f2f2f2;
      scroll-behavior: smooth;
    }

    /* ===== NAVBAR ===== */
    nav {
      background: #008000;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      background: white;
      width: 300px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
    }

    .btn {
      display: inline-block;
      padding: 10px 18px;
      margin: 8px 5px;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
    }

    .wa { background-color: #25D366; }
    .ig { background-color: #E1306C; }

    footer {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- MENU -->
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- HOME -->
  <section id="home">
    <div class="card">
      <img src="https://via.placeholder.com/120" class="profile-img">
      <h1>Yanto</h1>
      <p>Web developer pemula yang lagi belajar coding.</p>
    </div>
  </section>

  <!-- ABOUT -->
  <section id="about">
    <h2>Tentang Saya</h2>
    <p>Saya sedang belajar HTML & CSS dan ingin menjadi web developer profesional.</p>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Hubungi Saya</h2>

    <a href="https://wa.me/6281234567890" class="btn wa" target="_blank">
      <i class="fab fa-whatsapp"></i> WhatsApp
    </a>

    <a href="https://instagram.com/usernamekamu" class="btn ig" target="_blank">
      <i class="fab fa-instagram"></i> Instagram
    </a>
  </section>

  <footer>
    © 2026 Yanto | Dibuat dengan semangat belajar 🔥
  </footer>

</body>
</html>
