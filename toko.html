<!DOCTYPE html>
<html>
<head>
<title>Toko Online</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#008000;
color:white;
text-align:center;
padding:20px;
}

.product-container{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:40px;
}

.product-card{
background:white;
width:250px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
padding:20px;
}

.product-card img{
width:100%;
border-radius:10px;
}

.price{
color:green;
font-weight:bold;
margin:10px 0;
}

.btn{
display:inline-block;
background:#25D366;
color:white;
padding:10px 15px;
text-decoration:none;
border-radius:5px;
}

</style>
</head>

<body>

<header>
<h1>Toko Online Sederhana</h1>
<p>Contoh website toko untuk UMKM</p>
</header>

<section class="product-container">

<div class="product-card">
<img src="https://images.unsplash.com/photo-1517685352821-92cf88aee5a5">
<h3>Kopi Arabica</h3>
<p class="price">Rp45.000</p>
<a href="https://wa.me/6283128557385" class="btn">Beli via WhatsApp</a>
</div>

<div class="product-card">
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
<h3>Kopi Robusta</h3>
<p class="price">Rp35.000</p>
<a href="https://wa.me/6283128557385" class="btn">Beli via WhatsApp</a>
</div>

<div class="product-card">
<img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735">
<h3>Kopi Latte</h3>
<p class="price">Rp30.000</p>
<a href="https://wa.me/6283128557385" class="btn">Beli via WhatsApp</a>
</div>

</section>

</body>
</html>
